@if (isInternalLink()) {
  <a
    [routerLink]="['/details']"
    [queryParams]="{ id: node().id }"
    [attr.aria-label]="'Bekijk details van ' + getNodeName(node())"
  >
    <ng-container *ngTemplateOutlet="linkContent" />
  </a>
} @else {
  <a
    [href]="node().id"
    target="_blank"
    rel="noopener noreferrer"
    [attr.aria-label]="'Bekijk externe link van ' + getNodeName(node())"
  >
    <ng-container *ngTemplateOutlet="linkContent" />
    <ng-icon name="featherExternalLink" size="14" />
  </a>
}

<ng-template #linkContent>
  <span class="underline">{{ getNodeName(node()) }}</span>

  @if (showType() && getNodeType(node())) {
    <span class="text-xs text-base-content/60" aria-label="Type">
      ({{ getNodeType(node()) }})
    </span>
  }
</ng-template>
