@if (imagesWithDimensions().length > 0) {
  <div
    [id]="galleryId"
    [class]="
      displayedThumbnails().length === 1
        ? 'gap-2'
        : 'columns-1 sm:columns-2 gap-2'
    "
    (click)="$event.stopPropagation()"
  >
    @for (image of imagesWithDimensions(); track $index) {
      <a
        [href]="image.src"
        [attr.data-pswp-width]="image.dimensions?.width || 1280"
        [attr.data-pswp-height]="image.dimensions?.height || 720"
        [attr.aria-label]="'View ' + image.alt + ' in fullscreen'"
        [class]="
          $index < displayedThumbnails().length
            ? 'block mb-2 overflow-hidden hover:opacity-90 transition-opacity cursor-pointer break-inside-avoid'
            : 'hidden'
        "
      >
        <img
          [src]="image.thumbnail"
          [alt]="image.alt"
          [class]="
            displayedThumbnails().length === 1
              ? 'w-full h-auto max-h-96 object-cover rounded'
              : 'w-full h-auto object-cover rounded'
          "
          (error)="onThumbnailError($event)"
        />
      </a>
    }
  </div>
}
