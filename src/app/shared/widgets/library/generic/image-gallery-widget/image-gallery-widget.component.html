@if (imagesWithDimensions().length > 0) {
  <div
    [id]="galleryId"
    class="grid gap-2"
    [class]="displayedThumbnails().length === 1 ? 'grid-cols-1' : 'grid-cols-2'"
    (click)="$event.stopPropagation()"
  >
    @for (image of imagesWithDimensions(); track $index) {
      <a
        [href]="image.src"
        [attr.data-pswp-width]="image.dimensions?.width || 1280"
        [attr.data-pswp-height]="image.dimensions?.height || 720"
        [attr.aria-label]="'View ' + image.alt + ' in fullscreen'"
        [class]="
          $index < displayedThumbnails().length
            ? 'block overflow-hidden hover:opacity-90 transition-opacity cursor-pointer'
            : 'hidden'
        "
      >
        <img
          [src]="image.thumbnail"
          [alt]="image.alt"
          class="w-full h-auto object-cover rounded"
          (error)="onThumbnailError($event)"
        />
      </a>
    }
  </div>
}
