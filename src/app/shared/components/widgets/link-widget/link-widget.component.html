@if (nodes.length > 0) {
  <ul class="space-y-2" role="list">
    @for (node of nodes; track node.id) {
      <li>
        <a
          [routerLink]="['/details', getEncodedId(node)]"
          class="flex items-baseline gap-2"
          [attr.aria-label]="'View details for ' + getNodeName(node)"
        >
          <span class="underline decoration-base-content/30">{{
            getNodeName(node)
          }}</span>
          @if (getNodeType(node)) {
            <span class="text-xs text-base-content/60" aria-label="Type">
              ({{ getNodeType(node) }})
            </span>
          }
        </a>
      </li>
    }
  </ul>
}
