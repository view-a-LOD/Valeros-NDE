<a
  [routerLink]="detailsRoute()"
  class="card border border-base-300 cursor-pointer hover:bg-base-200 transition-colors block no-underline"
>
  <div class="card-body p-4">
    <!-- Top Container -->
    <div class="position-container position-container-topbottom">
      @for (item of widgetsByPosition().top; track $index) {
        <app-dynamic-widget
          [data]="data()"
          [property]="item.property"
          [widget]="item.widget"
        />
      }
    </div>

    <!-- Middle Row: Left, Main, Right -->
    <div class="flex gap-2 min-w-0">
      <!-- Left Container -->
      <div class="position-container position-container-side">
        @for (item of widgetsByPosition().left; track $index) {
          <app-dynamic-widget
            [data]="data()"
            [property]="item.property"
            [widget]="item.widget"
          />
        }
      </div>

      <!-- Main Container -->
      <div class="position-container flex-1 min-w-[33%]">
        @for (item of widgetsByPosition().main; track $index) {
          <app-dynamic-widget
            [data]="data()"
            [property]="item.property"
            [widget]="item.widget"
          />
        }
      </div>

      <!-- Right Container -->
      <div class="position-container position-container-side">
        @for (item of widgetsByPosition().right; track $index) {
          <app-dynamic-widget
            [data]="data()"
            [property]="item.property"
            [widget]="item.widget"
          />
        }
      </div>
    </div>

    <!-- Bottom Container -->
    <div class="position-container position-container-topbottom bg-purple-100">
      @for (item of widgetsByPosition().bottom; track $index) {
        <app-dynamic-widget
          [data]="data()"
          [property]="item.property"
          [widget]="item.widget"
        />
      }
    </div>
  </div>
</a>
