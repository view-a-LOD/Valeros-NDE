<div class="p-4">
  @if (loading()) {
    <div class="flex items-center justify-center p-8">
      <span class="loading loading-spinner loading-lg"></span>
    </div>
  } @else if (error()) {
    <div class="alert alert-error">
      <span>{{ error() }}</span>
    </div>
  } @else if (data()) {
    <app-node [data]="data()!" />
  } @else {
    <p>No data available</p>
  }
</div>
