<button
  class="w-full text-left px-3 py-2 hover:bg-base-200 rounded-md transition-colors flex items-center gap-3"
  (click)="itemClick.emit()"
>
  @if (item().image && item().image?.thumbnail) {
    <img
      [src]="item().image!.thumbnail"
      [alt]="item().image!.alt"
      class="w-12 h-12 object-cover rounded"
    />
  }
  <div class="flex-1 min-w-0">
    <div class="font-medium">{{ item().name || 'No label' }}</div>
    <div class="text-xs text-base-content/60 font-mono truncate">
      {{ item().id }}
    </div>
  </div>
</button>
