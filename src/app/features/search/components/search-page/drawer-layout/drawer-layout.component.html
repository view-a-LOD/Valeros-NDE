<div class="drawer" [class.lg:drawer-open]="isOpen()">
  <input
    #drawerCheckbox
    [id]="drawerId()"
    type="checkbox"
    class="drawer-toggle"
    [checked]="isOpen()"
  />

  <div class="drawer-content flex flex-col">
    <ng-content select="[drawer-content]"></ng-content>
  </div>

  <div class="drawer-side z-20">
    <label
      [for]="drawerId()"
      [attr.aria-label]="closeLabel()"
      class="drawer-overlay"
    ></label>
    <div class="bg-app-bg-dark min-h-full p-4" [style.width]="sidebarWidth()">
      @if (sidebarTitle()) {
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-lg font-bold">{{ sidebarTitle() }}</h2>
          <app-drawer-toggle-button
            [drawerId]="drawerId()"
            [isOpen]="isOpen()"
            (toggle)="toggleDrawer()"
            buttonClass="btn btn-sm btn-circle btn-ghost"
            [icon]="featherX"
            iconSize="20"
            [iconOnly]="true"
          />
        </div>
      }
      <ng-content select="[drawer-sidebar]"></ng-content>
    </div>
  </div>
</div>
