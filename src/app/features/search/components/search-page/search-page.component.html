<app-drawer-layout
  #drawer
  drawerId="facets-drawer"
  sidebarTitle="Filters"
  closeLabel="Filters paneel sluiten"
  [initiallyOpen]="isDesktop()"
>
  <div drawer-content>
    <div class="container mx-auto p-8 max-w-6xl">
      <div class="sticky top-0 z-10 bg-app-bg pb-6 -mt-8 pt-8 -mx-8 px-8">
        <div class="flex items-center gap-2">
          <app-drawer-toggle-button
            [class.lg:hidden]="drawer.isOpen()"
            drawerId="facets-drawer"
            [isOpen]="drawer.isOpen()"
            (toggle)="drawer.toggleDrawer()"
            [icon]="featherFilter"
            buttonClass="btn"
            [iconOnly]="true"
          />
          <div class="flex-1">
            <app-search-bar />
          </div>
        </div>

        @if (store.error()) {
          <div class="alert alert-error mt-6">
            <span>{{ store.error() }}</span>
          </div>
        }
      </div>

      @if (store.results().length > 0) {
        <div
          class="mb-4 flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between"
        >
          <app-results-count
            [totalResults]="store.totalResults()"
            [showingResults]="store.results().length"
          />

          <app-search-sort />
        </div>

        <div class="columns-1 md:columns-2 gap-4 space-y-4">
          @for (result of store.results(); track result.id) {
            <div class="break-inside-avoid mb-4">
              <app-node [data]="result" />
            </div>
          }
        </div>

        <app-pagination
          [currentPage]="store.currentPage()"
          [totalItems]="store.totalResults()"
          [pageSize]="store.pageSize()"
        />
      } @else if (!store.loading() && store.searchTerm()) {
        <div
          tabindex="-1"
          class="text-center py-12 text-base-content/60 outline-none"
        >
          <p>Geen resultaten gevonden voor "{{ store.searchTerm() }}"</p>
        </div>
      }
    </div>
  </div>

  <div drawer-sidebar>
    <app-facets />
  </div>
</app-drawer-layout>
