<app-property-label-wrapper
  [property]="property()"
  [showLabel]="showPropertyLabel()"
>
  @if (getHighlightedFirstValue()) {
    @if (asHeader()) {
      <h2 class="text-2xl font-bold">
        <app-highlighted-text [text]="getHighlightedFirstValue()!" />
      </h2>
    } @else {
      <app-highlighted-text [text]="getHighlightedFirstValue()!" />
    }
  }
</app-property-label-wrapper>
