<app-property-label-wrapper
  [property]="property()"
  [showLabel]="showPropertyLabel()"
>
  @if (asHeader()) {
    @for (value of getHighlightedValues(); track $index) {
      <h2 class="text-2xl font-bold">
        <app-highlighted-text [text]="value" />
      </h2>
    }
  } @else {
    @for (value of getHighlightedValues(); track $index) {
      <div>
        <app-highlighted-text [text]="value" />
      </div>
    }
  }
</app-property-label-wrapper>
