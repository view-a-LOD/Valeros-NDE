@if (manifestUrls().length > 0) {
  <app-property-label-wrapper [property]="property()" [config]="config()">
    @for (manifestUrl of manifestUrls(); track $index) {
      <div
        [id]="getMiradorElementId($index)"
        class="relative w-full h-[600px] mb-4"
      ></div>
    }
  </app-property-label-wrapper>
}
