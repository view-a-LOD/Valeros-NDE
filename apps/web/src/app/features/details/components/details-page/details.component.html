<div class="p-4">
  @if (decodedId) {
    <div class="mb-4">
      <h2 class="text-lg font-semibold mb-2">ID:</h2>
      <p class="text-sm break-all">{{ decodedId }}</p>
    </div>

    <div>
      <h2 class="text-lg font-semibold mb-2">JSON:</h2>
      <pre class="text-xs font-mono bg-base-300 p-3 rounded overflow-x-auto">{{
        { id: decodedId } | json
      }}</pre>
    </div>
  } @else {
    <p>No ID provided</p>
  }
</div>
