@if (show() && hasResults()) {
  <div
    class="absolute z-10 w-full mt-2 bg-base-100 rounded-lg shadow-lg border border-base-300 max-h-96 overflow-y-auto"
    (mousedown)="$event.preventDefault()"
  >
    @if (loading()) {
      <div class="p-4 text-center">
        <span class="loading loading-spinner loading-sm"></span>
      </div>
    } @else {
      @if (results().length > 0) {
        <div class="p-2">
          <div class="text-xs font-semibold text-base-content/60 px-3 py-2">
            Results
          </div>
          @for (item of results(); track item.$id) {
            <button
              class="w-full text-left px-3 py-2 hover:bg-base-200 rounded-md transition-colors"
              (click)="selectItem.emit(item)"
            >
              <div class="font-medium">{{ item.label || 'No label' }}</div>
              <div class="text-xs text-base-content/60 font-mono truncate">
                {{ item.$id }}
              </div>
            </button>
          }
        </div>
      }

      @if (suggestions().length > 0) {
        <div class="p-2 border-t border-base-300">
          <div class="text-xs font-semibold text-base-content/60 px-3 py-2">
            Suggestions
          </div>
          @for (suggestion of suggestions(); track suggestion) {
            <button
              class="w-full text-left px-3 py-2 hover:bg-base-200 rounded-md transition-colors flex items-center gap-2"
              (click)="selectSuggestion.emit(suggestion)"
            >
              <span>{{ suggestion }}</span>
            </button>
          }
        </div>
      }
    }
  </div>
}
