<div
  class="card border border-base-300 cursor-pointer hover:bg-base-200 transition-colors"
  (click)="navigateToDetails()"
  (keyup.enter)="navigateToDetails()"
  tabindex="0"
  role="button"
>
  <div class="card-body p-4">
    @for (property of orderedProperties(); track property) {
      <div class="mb-2">
        <app-dynamic-widget [node]="result()" [property]="property" />
      </div>
    }

    <hr />

    <app-property-label-wrapper [property]="'Full node JSON'">
      <pre
        class="text-xs font-mono bg-base-300 p-3 rounded overflow-x-auto mt-2 opacity-20 hover:opacity-100 transition-opacity"
        >{{ result() | json }}</pre
      >
    </app-property-label-wrapper>
  </div>
</div>
