<div
  class="card border border-base-300 cursor-pointer hover:bg-base-200 transition-colors"
  (click)="navigateToDetails()"
  (keyup.enter)="navigateToDetails()"
  tabindex="0"
  role="button"
>
  <div class="card-body p-4">
    @for (propItem of result() | keyvalue; track propItem.key) {
      <div class="mb-2">
        <app-dynamic-widget [node]="result()" [propertyUri]="propItem.key" />
      </div>
    }

    <hr />

    <pre
      class="text-xs font-mono bg-base-300 p-3 rounded overflow-x-auto mt-2 opacity-20 hover:opacity-100 transition-opacity"
      >{{ result() | json }}</pre
    >
  </div>
</div>
