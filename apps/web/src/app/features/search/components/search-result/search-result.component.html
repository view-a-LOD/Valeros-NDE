<div
  class="card border border-base-300 cursor-pointer hover:bg-base-200 transition-colors"
  (click)="navigateToDetails()"
  (keyup.enter)="navigateToDetails()"
  tabindex="0"
  role="button"
>
  <div class="card-body p-4">
    @for (property of orderedProperties(); track property) {
      <div class="mb-2">
        <app-dynamic-widget [node]="result()" [property]="property" />
      </div>
    }

    <details
      (click)="$event.stopPropagation()"
      (keydown)="$event.stopPropagation()"
      tabindex="0"
    >
      <summary>Full node JSON</summary>
      <pre
        class="text-xs font-mono bg-base-300 p-3 rounded overflow-x-auto mt-2"
        >{{ result() | json }}</pre
      >
    </details>
  </div>
</div>
